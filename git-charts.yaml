# Git 源 Helm Chart 清单：仓库只存源码、未发布为 OCI 的 chart，需 git clone + helm package 后搬运
# 字段：
#   repo      git 仓库地址
#   path      chart 在仓库中的子路径
#   ref       git 分支/tag/commit（用于 git checkout）
#   namespace chart 推到 TCR 时的目标前缀（可多段，受 KEEP_CHART_NAMESPACE 控制）；
#             helm push 会自动在其后追加 chart 名
# chart 版本号由 helm package 自动从 Chart.yaml 读取，无需在此重复。
charts:
#  - repo: https://github.com/percona/percona-helm-charts.git
#    path: charts/ps-operator
#    ref: ps-operator-1.2.0
#    namespace: percona/helm-charts
#  - repo: https://github.com/percona/percona-helm-charts.git
#    path: charts/ps-db
#    ref: ps-db-1.2.0
#    namespace: percona/helm-charts
#  - repo: https://github.com/nacos-group/nacos-k8s.git
#    path: helm
#    ref: v1.0.2
#    namespace: nacos-group/helm-charts
  - repo: https://github.com/nacos-group/nacos-k8s.git
    path: operator/chart/nacos-operator
    ref: v1.0.2
    namespace: nacos-group/helm-charts
