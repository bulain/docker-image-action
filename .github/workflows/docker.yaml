name: Docker

on:
  workflow_dispatch:
    inputs:
      push_images:
        description: "是否推送镜像到 registry"
        type: boolean
        default: true
      keep_image_namespace:
        description: "推送镜像时是否保留原命名空间（如 bitnami/redis）"
        type: boolean
        default: false
  push:
    branches: [ master ]


env:
  ACR_REGISTRY_ENDPOINT: "${{ secrets.ACR_REGISTRY_ENDPOINT }}"
  ACR_REGISTRY_NS: "${{ secrets.ACR_REGISTRY_NS }}"
  ACR_REGISTRY_AK: "${{ secrets.ACR_REGISTRY_AK }}"
  ACR_REGISTRY_SK: "${{ secrets.ACR_REGISTRY_SK }}"
  # push 触发时 inputs 为空，fallback 到默认值：推送镜像、不保留命名空间
  PUSH_IMAGES: "${{ github.event.inputs.push_images || 'true' }}"
  KEEP_IMAGE_NAMESPACE: "${{ github.event.inputs.keep_image_namespace || 'false' }}"

jobs:

  build:
    name: Pull
    runs-on: ubuntu-latest
    steps:
      - name: Before freeing up disk space
        run: |
          echo "Before freeing up disk space"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="

      # 增加可用磁盘空间
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:

          root-reserve-mb: 2048
          swap-size-mb: 128
          remove-dotnet: 'true'
          remove-haskell: 'true'
          # 如果空间还是不够用，可以把以下开启，清理出更多空间
          # remove-android: 'true'
          # remove-codeql: 'true'
          build-mount-path: '/var/lib/docker/'

      - name: Restart docker
        run: sudo service docker restart

      - name: Free up disk space complete
        run: |
          echo "Free up disk space complete"
          echo "=============================================================================="
          df -hT
          echo "=============================================================================="

      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        run: |
          # push_images 关闭时跳过登录与整个搬运循环
          if [ "$PUSH_IMAGES" != "true" ]; then
              echo "跳过（push_images 关闭）"
              exit 0
          fi
          docker login -u $ACR_REGISTRY_AK -p $ACR_REGISTRY_SK $ACR_REGISTRY_ENDPOINT

          # 逐条读取 images.yaml 的 images 数组（注释掉的条目 yq 读不到，天然=禁用）
          count=$(yq '.images | length' images.yaml)
          for i in $(seq 0 $((count - 1))); do
              line=$(yq ".images[$i]" images.yaml)

              echo "docker pull $line"
              docker pull $line
              platform=$(echo "$line" | awk -F'--platform[ =]' '{if (NF>1) print $2}' | awk '{print $1}')
              echo "platform is $platform"
              # 如果存在架构信息 将架构信息拼到镜像名称前面
              if [ -z "$platform" ]; then
                  platform_prefix=""
              else
                  platform_prefix="${platform//\//_}_"
              fi
              echo "platform_prefix is $platform_prefix"
              # 获取镜像的完整名称，例如kasmweb/nginx:1.25.3（命名空间/镜像名:版本号）
              image=$(echo "$line" | awk '{print $NF}')
              # 将@sha256:等字符删除
              image_no_digest="${image%%@*}"

              # 获取 镜像名:版本号  例如nginx:1.25.3
              image_name_tag=$(echo "$image_no_digest" | awk -F'/' '{print $NF}')

              if [ "$KEEP_IMAGE_NAMESPACE" = "true" ]; then
                  # 保留命名空间段（去掉 registry 域名），如 bitnami/nginx:1.25.3
                  name_path=$(echo "$image_no_digest" | awk -F'/' '{if (NF>=2) print $(NF-1)"/"$NF; else print $NF}')
              else
                  # 只留镜像名:版本号
                  name_path="$image_name_tag"
              fi

              new_image="$ACR_REGISTRY_ENDPOINT/$ACR_REGISTRY_NS/$platform_prefix$name_path"
              echo "docker tag $image $new_image"
              docker tag $image $new_image
              echo "docker push $new_image"
              docker push $new_image
              echo "开始清理磁盘空间"
              echo "=============================================================================="
              df -hT
              echo "=============================================================================="
              docker rmi $image
              docker rmi $new_image
              echo "磁盘空间清理完毕"
              echo "=============================================================================="
              df -hT
              echo "=============================================================================="

          done