name: Helm

on:
  workflow_dispatch:
    inputs:
      push_charts:
        description: "是否推送 chart 本身到 registry"
        type: boolean
        default: true
      push_images:
        description: "是否推送 chart 引用的镜像到 registry"
        type: boolean
        default: true
      keep_image_namespace:
        description: "推送镜像时是否保留原命名空间（如 bitnami/redis）"
        type: boolean
        default: false
      keep_image_original_tag:
        description: "推送镜像时是否保留镜像原始 tag（关闭则用 chart 版本号作 tag）"
        type: boolean
        default: true
      keep_chart_namespace:
        description: "推送 chart 时是否保留域名之后的完整路径作子路径（如 grafana-community/helm-charts）"
        type: boolean
        default: true
      chart_plain_http:
        description: "推送 chart 时使用明文 HTTP（--plain-http），关闭则用 HTTPS"
        type: boolean
        default: true
  push:
    branches: [ master ]


env:
  ACR_REGISTRY_ENDPOINT: "${{ secrets.ACR_REGISTRY_ENDPOINT }}"
  ACR_REGISTRY_AK: "${{ secrets.ACR_REGISTRY_AK }}"
  ACR_REGISTRY_SK: "${{ secrets.ACR_REGISTRY_SK }}"
  ACR_REGISTRY_NS: "${{ secrets.ACR_REGISTRY_NS }}"
  TCR_REGISTRY_ENDPOINT: "${{ secrets.TCR_REGISTRY_ENDPOINT }}"
  TCR_REGISTRY_AK: "${{ secrets.TCR_REGISTRY_AK }}"
  TCR_REGISTRY_SK: "${{ secrets.TCR_REGISTRY_SK }}"
  TCR_REGISTRY_NS: "${{ secrets.TCR_REGISTRY_NS }}"
  # push 触发时 inputs 为空，fallback 到默认值：推 chart 不推镜像、镜像不保留命名空间、chart 保留、chart 走 HTTP
  PUSH_CHARTS: "${{ github.event.inputs.push_charts || 'true' }}"
  PUSH_IMAGES: "${{ github.event.inputs.push_images || 'true' }}"
  KEEP_IMAGE_NAMESPACE: "${{ github.event.inputs.keep_image_namespace || 'false' }}"
  KEEP_IMAGE_ORIGINAL_TAG: "${{ github.event.inputs.keep_image_original_tag || 'true' }}"
  KEEP_CHART_NAMESPACE: "${{ github.event.inputs.keep_chart_namespace || 'true' }}"
  CHART_PLAIN_HTTP: "${{ github.event.inputs.chart_plain_http || 'true' }}"

jobs:

  mirror:
    name: Mirror Helm Charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Pull charts, mirror images and push to ACR
        run: |
          set -e
          # 镜像推送到 ACR（仅在推送镜像时登录）
          if [ "$PUSH_IMAGES" = "true" ]; then
              docker login -u "$ACR_REGISTRY_AK" -p "$ACR_REGISTRY_SK" "$ACR_REGISTRY_ENDPOINT"
          fi
          # chart 走 HTTP 还是 HTTPS
          if [ "$CHART_PLAIN_HTTP" = "true" ]; then
              HELM_HTTP_FLAG="--plain-http"
          else
              HELM_HTTP_FLAG=""
          fi
          # chart 推送到支持 OCI chart 的 registry（ACR 个人版不支持 helm chart；仅在推送 chart 时登录）
          if [ "$PUSH_CHARTS" = "true" ]; then
              helm registry login "$TCR_REGISTRY_ENDPOINT" -u "$TCR_REGISTRY_AK" -p "$TCR_REGISTRY_SK" $HELM_HTTP_FLAG
          fi

          mkdir -p ./charts

          # 逐条读取 helm.yaml 清单的 charts 数组（注释掉的条目 yq 读不到，天然=禁用）
          count=$(yq '.charts | length' helm.yaml)
          for i in $(seq 0 $((count - 1))); do
              line=$(yq ".charts[$i]" helm.yaml)

              # 拆出 tag（版本）与 chart 引用
              entry=$(echo "$line" | awk '{print $NF}')
              tag="${entry##*:}"
              ref="${entry%:*}"

              # 短写补全默认 registry
              case "$ref" in
                  oci://*) ;;
                  *) ref="oci://registry-1.docker.io/$ref" ;;
              esac

              echo "=============================================================================="
              echo "处理 chart: $ref --version $tag"
              echo "=============================================================================="

              # 两开关皆关时空操作
              if [ "$PUSH_IMAGES" != "true" ] && [ "$PUSH_CHARTS" != "true" ]; then
                  echo "跳过（push_charts 与 push_images 均关闭）"
                  continue
              fi

              # ---- 1. 解析 chart 引用的镜像并逐个搬运 ----
              if [ "$PUSH_IMAGES" = "true" ]; then
                echo "helm template $ref --version $tag 提取 image 字段"
                # helm images get 只识别标准工作负载，认不出 CR（如 RedisSentinel、PerconaServerMySQL）里的 image。
                # 改用 helm template 渲染后提取所有 image: 字段值，对标准工作负载与 CR 都有效。
                # 用进程替换避免 while 子 shell，让 set -e 在循环体内生效
                # awk '!seen[$0]++' 按原始字符串去重，保留原顺序
                while read -r img; do
                    [[ -z "$img" ]] && continue
                    echo "docker pull $img"
                    docker pull "$img"
                    # 去掉 @sha256 摘要与原 tag，得到镜像路径
                    path="${img%%@*}"
                    path="${path%:*}"
                    if [ "$KEEP_IMAGE_NAMESPACE" = "true" ]; then
                        # 保留命名空间段（去掉 registry 域名），如 bitnami/redis
                        image_name=$(echo "$path" | awk -F'/' '{if (NF>=2) print $(NF-1)"/"$NF; else print $NF}')
                    else
                        # 只留镜像名，如 redis
                        image_name=$(echo "$path" | awk -F'/' '{print $NF}')
                    fi
                    # 决定新镜像的 tag
                    if [ "$KEEP_IMAGE_ORIGINAL_TAG" = "true" ]; then
                        # 保留镜像原始 tag；无 @sha256 前的 tag 时回退到 chart 版本号
                        no_digest="${img%%@*}"
                        orig_tag="${no_digest##*:}"
                        if [ "$orig_tag" = "$no_digest" ]; then
                            image_tag="$tag"
                        else
                            image_tag="$orig_tag"
                        fi
                    else
                        # 用 chart 版本号作 tag
                        image_tag="$tag"
                    fi
                    new_img="$ACR_REGISTRY_ENDPOINT/$ACR_REGISTRY_NS/$image_name:$image_tag"
                    echo "docker tag $img $new_img"
                    docker tag "$img" "$new_img"
                    echo "docker push $new_img"
                    docker push "$new_img"
                    # 逐个清理，控制磁盘
                    docker rmi "$img" "$new_img" || true
                done < <(helm template "$ref" --version "$tag" 2>/dev/null \
                    | grep -oE '^[[:space:]]*(image|initImage):[[:space:]]*.+' \
                    | sed -E 's/^[[:space:]]*[a-zA-Z]+:[[:space:]]*//' \
                    | tr -d '\042\047' \
                    | grep -vE '^[[:space:]]*$' \
                    | awk '!seen[$0]++')
              fi

              # ---- 2. push chart 本身 ----
              if [ "$PUSH_CHARTS" = "true" ]; then
                echo "helm pull $ref --version $tag"
                helm pull "$ref" --version "$tag" -d ./charts
                tgz=$(ls ./charts/*.tgz)
                if [ "$KEEP_CHART_NAMESPACE" = "true" ]; then
                    # 保留域名之后、chart 名之前的完整路径，如 grafana-community/helm-charts
                    chart_ns=$(echo "$ref" | sed 's#^oci://##' | awk -F'/' '{for(i=2;i<NF;i++){printf "%s%s", (i>2?"/":""), $i}}')
                    chart_target="oci://$TCR_REGISTRY_ENDPOINT/$TCR_REGISTRY_NS/$chart_ns"
                else
                    chart_target="oci://$TCR_REGISTRY_ENDPOINT/$TCR_REGISTRY_NS"
                fi
                echo "helm push $tgz $chart_target"
                helm push "$tgz" "$chart_target" $HELM_HTTP_FLAG
                rm -f ./charts/*.tgz
              fi

          done

