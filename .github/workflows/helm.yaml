name: Helm

on:
  workflow_dispatch:
    inputs:
      keep_image_namespace:
        description: "推送镜像时是否保留原命名空间（如 bitnami/redis）"
        type: boolean
        default: false
      keep_chart_namespace:
        description: "推送 chart 时是否保留原命名空间作子路径（如 bitnamicharts）"
        type: boolean
        default: true
      chart_plain_http:
        description: "推送 chart 时使用明文 HTTP（--plain-http），关闭则用 HTTPS"
        type: boolean
        default: true
  push:
    branches: [ master ]


env:
  ACR_REGISTRY_ENDPOINT: "${{ secrets.ACR_REGISTRY_ENDPOINT }}"
  ACR_REGISTRY_AK: "${{ secrets.ACR_REGISTRY_AK }}"
  ACR_REGISTRY_SK: "${{ secrets.ACR_REGISTRY_SK }}"
  ACR_REGISTRY_IMAGES: "${{ secrets.ACR_REGISTRY_IMAGES }}"
  TCR_REGISTRY_ENDPOINT: "${{ secrets.TCR_REGISTRY_ENDPOINT }}"
  TCR_REGISTRY_AK: "${{ secrets.TCR_REGISTRY_AK }}"
  TCR_REGISTRY_SK: "${{ secrets.TCR_REGISTRY_SK }}"
  TCR_REGISTRY_NS: "${{ secrets.TCR_REGISTRY_NS }}"
  # push 触发时 inputs 为空，fallback 到默认值：镜像不保留、chart 保留、chart 走 HTTP
  KEEP_IMAGE_NAMESPACE: "${{ github.event.inputs.keep_image_namespace || 'false' }}"
  KEEP_CHART_NAMESPACE: "${{ github.event.inputs.keep_chart_namespace || 'true' }}"
  CHART_PLAIN_HTTP: "${{ github.event.inputs.chart_plain_http || 'true' }}"

jobs:

  mirror:
    name: Mirror Helm Charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Install helm-images plugin
        run: helm plugin install https://github.com/nikhilsbhat/helm-images --verify=false

      - name: Pull charts, mirror images and push to ACR
        run: |
          set -e
          # 镜像推送到 ACR
          docker login -u "$ACR_REGISTRY_AK" -p "$ACR_REGISTRY_SK" "$ACR_REGISTRY_ENDPOINT"
          # chart 走 HTTP 还是 HTTPS
          if [ "$CHART_PLAIN_HTTP" = "true" ]; then
              HELM_HTTP_FLAG="--plain-http"
          else
              HELM_HTTP_FLAG=""
          fi
          # chart 推送到支持 OCI chart 的 registry（ACR 个人版不支持 helm chart）
          helm registry login "$TCR_REGISTRY_ENDPOINT" -u "$TCR_REGISTRY_AK" -p "$TCR_REGISTRY_SK" $HELM_HTTP_FLAG

          mkdir -p ./charts

          while IFS= read -r line || [ -n "$line" ]; do
              # 忽略空行与注释
              [[ -z "$line" ]] && continue
              if echo "$line" | grep -q '^\s*#'; then
                  continue
              fi

              # 拆出 tag（版本）与 chart 引用
              entry=$(echo "$line" | awk '{print $NF}')
              tag="${entry##*:}"
              ref="${entry%:*}"

              # 短写补全默认 registry
              case "$ref" in
                  oci://*) ;;
                  *) ref="oci://registry-1.docker.io/$ref" ;;
              esac

              echo "=============================================================================="
              echo "处理 chart: $ref --version $tag"
              echo "=============================================================================="

              # ---- 1. 解析 chart 引用的镜像并逐个搬运 ----
              echo "helm images get $ref --version $tag"
              # 用进程替换避免 while 子 shell，让 set -e 在循环体内生效
              # awk '!seen[$0]++' 按原始字符串去重，保留原顺序
              while read -r img; do
                  [[ -z "$img" ]] && continue
                  echo "docker pull $img"
                  docker pull "$img"
                  # 去掉 @sha256 摘要与原 tag，用 chart 版本号作 tag
                  path="${img%%@*}"
                  path="${path%:*}"
                  if [ "$KEEP_IMAGE_NAMESPACE" = "true" ]; then
                      # 保留命名空间段（去掉 registry 域名），如 bitnami/redis
                      image_name=$(echo "$path" | awk -F'/' '{if (NF>=2) print $(NF-1)"/"$NF; else print $NF}')
                  else
                      # 只留镜像名，如 redis
                      image_name=$(echo "$path" | awk -F'/' '{print $NF}')
                  fi
                  new_img="$ACR_REGISTRY_ENDPOINT/$ACR_REGISTRY_IMAGES/$image_name:$tag"
                  echo "docker tag $img $new_img"
                  docker tag "$img" "$new_img"
                  echo "docker push $new_img"
                  docker push "$new_img"
                  # 逐个清理，控制磁盘
                  docker rmi "$img" "$new_img" || true
              done < <(helm images get "$ref" --version "$tag" | awk '!seen[$0]++')

              # ---- 2. push chart 本身 ----
              echo "helm pull $ref --version $tag"
              helm pull "$ref" --version "$tag" -d ./charts
              tgz=$(ls ./charts/*.tgz)
              if [ "$KEEP_CHART_NAMESPACE" = "true" ]; then
                  # 取源命名空间作子路径，如 bitnamicharts
                  chart_ns=$(echo "$ref" | sed 's#^oci://##' | awk -F'/' '{if (NF>=2) print $(NF-1)}')
                  chart_target="oci://$TCR_REGISTRY_ENDPOINT/$TCR_REGISTRY_NS/$chart_ns"
              else
                  chart_target="oci://$TCR_REGISTRY_ENDPOINT/$TCR_REGISTRY_NS"
              fi
              echo "helm push $tgz $chart_target"
              helm push "$tgz" "$chart_target" $HELM_HTTP_FLAG
              rm -f ./charts/*.tgz

          done < charts.txt
